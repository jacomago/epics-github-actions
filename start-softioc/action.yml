name: Start softIoc
description: Start a softIocPVA (or softIocPVX) instance in the background

inputs:
  db-file:
    description: Path to the .db file to load
    required: true
  macros:
    description: Macro string passed to -m (e.g. "P=TEST:,R=REC:")
    required: false
    default: ''
  ioc-name:
    description: IOC name / prefix passed to -n
    required: false
    default: 'softioc'
  use-pvxs:
    description: Use softIocPVX (pvxs) instead of softIocPVA
    required: false
    default: 'false'
  wait-pv:
    description: CA/PVA PV name to poll until the IOC is ready (recommended)
    required: false
    default: ''
  wait-timeout:
    description: Seconds to wait when wait-pv is not set
    required: false
    default: '10'

runs:
  using: composite
  steps:
    - name: Start softIoc
      shell: micromamba-shell {0}
      env:
        DB_FILE: ${{ inputs.db-file }}
        MACROS: ${{ inputs.macros }}
        IOC_NAME: ${{ inputs.ioc-name }}
        USE_PVXS: ${{ inputs.use-pvxs }}
      run: |
        BINARY="softIocPVA"
        [ "$USE_PVXS" = "true" ] && BINARY="softIocPVX"

        ARGS=(-n "$IOC_NAME")
        [ -n "$MACROS" ] && ARGS+=(-m "$MACROS")
        ARGS+=("$DB_FILE")

        "$BINARY" "${ARGS[@]}" > "$RUNNER_TEMP/softioc.log" 2>&1 &
        echo "SOFTIOC_PID=$!" >> "$GITHUB_ENV"
        echo "Started $BINARY with PID $!"

    - name: Wait for IOC to be ready
      shell: micromamba-shell {0}
      env:
        WAIT_PV: ${{ inputs.wait-pv }}
        WAIT_TIMEOUT: ${{ inputs.wait-timeout }}
      run: |
        if [ -n "$WAIT_PV" ]; then
          echo "Polling PV: $WAIT_PV"
          for i in $(seq 1 30); do
            if caget -w 1 "$WAIT_PV" > /dev/null 2>&1; then
              echo "IOC ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::IOC did not become ready within 30s"
          cat "$RUNNER_TEMP/softioc.log"
          exit 1
        else
          echo "No wait-pv specified, sleeping ${WAIT_TIMEOUT}s"
          sleep "$WAIT_TIMEOUT"
        fi
