name: Setup PVXS
description: Pull a pre-built PVXS Docker image and install thin wrapper scripts on PATH

inputs:
  image:
    description: Docker image containing pvxs (e.g. ghcr.io/epics-containers/pvxs:1.3.1r1.0)
    required: false
    default: 'ghcr.io/epics-containers/pvxs:1.3.1r1.0'
  network-name:
    description: Docker network name used for CA/PVA communication
    required: false
    default: 'epics-net'

outputs:
  epics-host-arch:
    description: EPICS_HOST_ARCH value for the current runner
    value: ${{ steps.arch.outputs.epics-host-arch }}

runs:
  using: composite
  steps:
    - name: Pull PVXS Docker image
      shell: bash
      env:
        IMAGE: ${{ inputs.image }}
      run: |
        docker pull "$IMAGE"

    - name: Create Docker network
      shell: bash
      env:
        NETWORK: ${{ inputs.network-name }}
      run: |
        docker network create "$NETWORK" || true

    - name: Detect EPICS_HOST_ARCH
      id: arch
      shell: bash
      run: |
        ARCH=$(python3 -c "
        import platform
        m = platform.machine()
        s = platform.system()
        mapping = {
            ('Linux',  'x86_64'):  'linux-x86_64',
            ('Linux',  'aarch64'): 'linux-aarch64',
            ('Darwin', 'x86_64'):  'darwin-x86_64',
            ('Darwin', 'arm64'):   'darwin-aarch64',
        }
        print(mapping.get((s, m), f'{s.lower()}-{m}'))
        ")
        echo "EPICS_HOST_ARCH=${ARCH}" >> "$GITHUB_ENV"
        echo "epics-host-arch=${ARCH}" >> "$GITHUB_OUTPUT"

    - name: Export Docker image and network to environment
      shell: bash
      env:
        IMAGE: ${{ inputs.image }}
        NETWORK: ${{ inputs.network-name }}
      run: |
        echo "EPICS_DOCKER_IMAGE=${IMAGE}" >> "$GITHUB_ENV"
        echo "PVXS_DOCKER_IMAGE=${IMAGE}" >> "$GITHUB_ENV"
        echo "EPICS_DOCKER_NETWORK=${NETWORK}" >> "$GITHUB_ENV"

    - name: Write PVXS wrapper scripts
      shell: bash
      env:
        IMAGE: ${{ inputs.image }}
        NETWORK: ${{ inputs.network-name }}
      run: |
        WRAPPER_DIR="${RUNNER_TEMP}/epics-wrappers"
        mkdir -p "$WRAPPER_DIR"

        for CMD in caget caput camonitor cainfo softIocPVA pvget pvput pvmonitor pvinfo softIocPVX; do
          cat > "${WRAPPER_DIR}/${CMD}" <<EOF
        #!/usr/bin/env bash
        exec docker run --rm --network "${NETWORK}" "${IMAGE}" ${CMD} "\$@"
        EOF
          chmod +x "${WRAPPER_DIR}/${CMD}"
        done

        echo "${WRAPPER_DIR}" >> "$GITHUB_PATH"
        echo "Wrapper scripts installed in ${WRAPPER_DIR}"
