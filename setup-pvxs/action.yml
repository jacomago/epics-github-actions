name: Setup PVXS
description: >-
  Install epics-base and pvxs via conda (micromamba), a pre-built Docker image,
  or compilation from source. Select the approach with the 'method' input.

inputs:
  method:
    description: Installation method — 'conda', 'docker', or 'compile'
    required: false
    default: conda

  # ── conda ──────────────────────────────────────────────────────────────
  pvxs-version:
    description: >-
      pvxs version. conda: package version (e.g. "1.3.1").
      compile: git tag (e.g. "1.3.1"). Ignored for docker.
    required: false
    default: ''
  epics-version:
    description: epics-base version (conda and compile methods)
    required: false
    default: ''
  environment-name:
    description: conda environment name (conda method only)
    required: false
    default: epics

  # ── docker ─────────────────────────────────────────────────────────────
  image:
    description: Docker image containing pvxs and epics-base (docker method only)
    required: false
    default: 'ghcr.io/epics-containers/pvxs:1.3.1r1.0'
  network-name:
    description: Docker bridge network for CA/PVA communication (docker method only)
    required: false
    default: epics-net

  # ── compile ────────────────────────────────────────────────────────────
  install-prefix:
    description: Directory to install compiled EPICS Base and pvxs (compile method only)
    required: false
    default: '${{ github.workspace }}/.epics'

outputs:
  epics-host-arch:
    description: EPICS_HOST_ARCH value (e.g. linux-x86_64)
    value: ${{ steps.arch-conda.outputs.epics-host-arch || steps.arch-native.outputs.epics-host-arch || steps.setup-epics.outputs.epics-host-arch }}

runs:
  using: composite
  steps:

    # ── conda ──────────────────────────────────────────────────────────────
    - name: Setup micromamba (pvxs + epics-base)
      if: inputs.method == 'conda'
      uses: mamba-org/setup-micromamba@v2
      with:
        environment-name: ${{ inputs.environment-name }}
        create-args: >-
          ${{ inputs.pvxs-version  != '' && format('pvxs={0}',       inputs.pvxs-version)  || 'pvxs' }}
          ${{ inputs.epics-version != '' && format('epics-base={0}', inputs.epics-version) || 'epics-base' }}
        init-shell: bash
        cache-environment: true

    - name: Export arch and add conda env to PATH
      if: inputs.method == 'conda'
      id: arch-conda
      shell: micromamba-shell {0}
      run: |
        ARCH=$(python -c "
        import platform
        m = platform.machine()
        s = platform.system()
        mapping = {
            ('Linux',  'x86_64'):  'linux-x86_64',
            ('Linux',  'aarch64'): 'linux-aarch64',
            ('Darwin', 'x86_64'):  'darwin-x86_64',
            ('Darwin', 'arm64'):   'darwin-aarch64',
        }
        print(mapping.get((s, m), f'{s.lower()}-{m}'))
        ")
        echo "EPICS_HOST_ARCH=${ARCH}" >> "$GITHUB_ENV"
        echo "epics-host-arch=${ARCH}" >> "$GITHUB_OUTPUT"
        # Expose conda env's bin to subsequent bash steps
        echo "${CONDA_PREFIX}/bin" >> "$GITHUB_PATH"
        if [ "$(uname)" = "Linux" ]; then
          echo "LD_LIBRARY_PATH=${CONDA_PREFIX}/lib:${LD_LIBRARY_PATH}" >> "$GITHUB_ENV"
        fi

    # ── docker ─────────────────────────────────────────────────────────────
    - name: Detect EPICS_HOST_ARCH
      if: inputs.method == 'docker'
      id: arch-native
      shell: bash
      run: |
        case "$(uname -s)-$(uname -m)" in
          Linux-x86_64)   ARCH=linux-x86_64 ;;
          Linux-aarch64)  ARCH=linux-aarch64 ;;
          Darwin-x86_64)  ARCH=darwin-x86_64 ;;
          Darwin-arm64)   ARCH=darwin-aarch64 ;;
          *)              ARCH="$(uname -s | tr '[:upper:]' '[:lower:]')-$(uname -m)" ;;
        esac
        echo "EPICS_HOST_ARCH=${ARCH}" >> "$GITHUB_ENV"
        echo "epics-host-arch=${ARCH}" >> "$GITHUB_OUTPUT"

    - name: Pull image and create network
      if: inputs.method == 'docker'
      shell: bash
      env:
        IMAGE: ${{ inputs.image }}
        NETWORK: ${{ inputs.network-name }}
      run: |
        docker pull "$IMAGE"
        docker network create "$NETWORK" 2>/dev/null || docker network inspect "$NETWORK" > /dev/null
        echo "EPICS_DOCKER_IMAGE=${IMAGE}" >> "$GITHUB_ENV"
        echo "PVXS_DOCKER_IMAGE=${IMAGE}" >> "$GITHUB_ENV"
        echo "EPICS_DOCKER_NETWORK=${NETWORK}" >> "$GITHUB_ENV"

    - name: Install PVXS wrapper scripts
      if: inputs.method == 'docker'
      shell: bash
      env:
        IMAGE: ${{ inputs.image }}
        NETWORK: ${{ inputs.network-name }}
      run: |
        WRAPPERS="${RUNNER_TEMP}/epics-wrappers"
        mkdir -p "$WRAPPERS"
        for CMD in caget caput camonitor cainfo softIocPVA pvget pvput pvmonitor pvinfo softIocPVX; do
          printf '#!/usr/bin/env bash\nexec docker run --rm --network "%s" "%s" "%s" "$@"\n' \
            "$NETWORK" "$IMAGE" "$CMD" > "$WRAPPERS/$CMD"
          chmod +x "$WRAPPERS/$CMD"
        done
        echo "$WRAPPERS" >> "$GITHUB_PATH"

    # ── compile ────────────────────────────────────────────────────────────
    - name: Setup EPICS Base
      if: inputs.method == 'compile'
      id: setup-epics
      uses: ./setup-epics
      with:
        method: compile
        epics-version: ${{ inputs.epics-version }}
        install-prefix: ${{ inputs.install-prefix }}

    - name: Install cmake
      if: inputs.method == 'compile'
      shell: bash
      run: |
        if [ "$(uname)" = "Linux" ]; then
          sudo apt-get update -qq
          sudo apt-get install -y cmake
        elif ! command -v cmake > /dev/null 2>&1; then
          brew install cmake
        fi

    - name: Restore pvxs cache
      if: inputs.method == 'compile'
      uses: actions/cache@v4
      with:
        path: ${{ inputs.install-prefix }}
        key: pvxs-${{ inputs.pvxs-version || '1.3.1' }}-epics-${{ inputs.epics-version || '7.0.8' }}-${{ runner.os }}-${{ runner.arch }}

    - name: Compile pvxs
      if: inputs.method == 'compile'
      shell: bash
      env:
        VERSION: ${{ inputs.pvxs-version || '1.3.1' }}
        PREFIX: ${{ inputs.install-prefix }}
      run: |
        if [ ! -f "$PREFIX/bin/$EPICS_HOST_ARCH/pvget" ]; then
          git clone --branch "$VERSION" --depth 1 \
            https://github.com/mdavidsaver/pvxs.git
          cmake -S pvxs -B pvxs/build \
            -DCMAKE_INSTALL_PREFIX="$PREFIX" \
            -DEPICS_BASE="$PREFIX"
          cmake --build pvxs/build --parallel
          cmake --install pvxs/build
        fi
