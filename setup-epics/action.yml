name: Setup EPICS Base
description: >-
  Install epics-base via conda (micromamba), a pre-built Docker image, or
  compilation from source. Select the approach with the 'method' input.

inputs:
  method:
    description: Installation method — 'conda', 'docker', or 'compile'
    required: false
    default: conda

  # ── conda ──────────────────────────────────────────────────────────────
  epics-version:
    description: >-
      epics-base version. conda: package version (e.g. "7.0.9").
      compile: release tag without the leading R (e.g. "7.0.9"); minimum
      supported version for compile is 7.0.9 (older releases fail to build
      on modern Clang/GCC).
      Ignored for docker (version is encoded in the image tag).
    required: false
    default: ''
  environment-name:
    description: conda environment name (conda method only)
    required: false
    default: epics

  # ── docker ─────────────────────────────────────────────────────────────
  image:
    description: Docker image containing epics-base (docker method only)
    required: false
    default: 'ghcr.io/epics-containers/epics-base-developer:7.0.10ec1'
  network-name:
    description: Docker bridge network for CA/PVA communication (docker method only)
    required: false
    default: epics-net

  # ── compile ────────────────────────────────────────────────────────────
  install-prefix:
    description: Directory to install compiled EPICS Base (compile method only)
    required: false
    default: '${{ github.workspace }}/.epics'

outputs:
  epics-host-arch:
    description: EPICS_HOST_ARCH value (e.g. linux-x86_64)
    value: ${{ steps.arch-conda.outputs.epics-host-arch || steps.arch-native.outputs.epics-host-arch }}

runs:
  using: composite
  steps:

    # ── conda ──────────────────────────────────────────────────────────────
    - name: Setup micromamba
      if: inputs.method == 'conda'
      uses: mamba-org/setup-micromamba@v2
      with:
        environment-name: ${{ inputs.environment-name }}
        create-args: >-
          ${{ inputs.epics-version != '' && format('epics-base={0}', inputs.epics-version) || 'epics-base' }}
        init-shell: bash
        cache-environment: true
        # Skip the post-job shell deinit, which crashes on macOS runners.
        post-cleanup: none

    - name: Export arch and add conda env to PATH
      if: inputs.method == 'conda'
      id: arch-conda
      shell: micromamba-shell {0}
      run: |
        ARCH=$(python "$GITHUB_ACTION_PATH/../scripts/detect_arch.py")
        echo "EPICS_HOST_ARCH=${ARCH}" >> "$GITHUB_ENV"
        echo "epics-host-arch=${ARCH}" >> "$GITHUB_OUTPUT"
        # conda-forge installs epics-base under $CONDA_PREFIX/epics, with the CA
        # tools (caget, softIocPVA, …) in the EPICS arch subdirectory. $CONDA_PREFIX/bin
        # holds general conda tools. Expose both to subsequent plain-bash steps.
        echo "${CONDA_PREFIX}/bin" >> "$GITHUB_PATH"
        echo "${CONDA_PREFIX}/epics/bin/${ARCH}" >> "$GITHUB_PATH"
        echo "EPICS_BASE=${CONDA_PREFIX}/epics" >> "$GITHUB_ENV"
        python "$GITHUB_ACTION_PATH/../scripts/export_lib_paths.py" \
          "${CONDA_PREFIX}/epics/lib/${ARCH}" "${CONDA_PREFIX}/lib"

    # ── docker + compile ───────────────────────────────────────────────────
    - name: Detect EPICS_HOST_ARCH
      if: inputs.method != 'conda'
      id: arch-native
      shell: bash
      run: |
        ARCH=$(python "$GITHUB_ACTION_PATH/../scripts/detect_arch.py")
        echo "EPICS_HOST_ARCH=${ARCH}" >> "$GITHUB_ENV"
        echo "epics-host-arch=${ARCH}" >> "$GITHUB_OUTPUT"

    # ── docker ─────────────────────────────────────────────────────────────
    - name: Pull image and create network
      if: inputs.method == 'docker'
      shell: bash
      env:
        IMAGE: ${{ inputs.image }}
        NETWORK: ${{ inputs.network-name }}
      run: |
        docker pull "$IMAGE"
        docker network create "$NETWORK" 2>/dev/null || docker network inspect "$NETWORK" > /dev/null
        echo "EPICS_DOCKER_IMAGE=${IMAGE}" >> "$GITHUB_ENV"
        echo "EPICS_DOCKER_NETWORK=${NETWORK}" >> "$GITHUB_ENV"

    - name: Install EPICS wrapper scripts
      if: inputs.method == 'docker'
      shell: bash
      env:
        IMAGE: ${{ inputs.image }}
        NETWORK: ${{ inputs.network-name }}
      run: |
        WRAPPERS="${RUNNER_TEMP}/epics-wrappers"
        python "$GITHUB_ACTION_PATH/../scripts/make_docker_wrappers.py" \
          "$WRAPPERS" "$NETWORK" "$IMAGE" \
          caget caput camonitor cainfo softIoc softIocPVA
        echo "$WRAPPERS" >> "$GITHUB_PATH"

    # ── compile ────────────────────────────────────────────────────────────
    - name: Install build dependencies
      if: inputs.method == 'compile'
      shell: bash
      run: |
        if [ "$(uname)" = "Linux" ]; then
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libreadline-dev perl
        fi

    - name: Restore EPICS Base cache
      if: inputs.method == 'compile'
      uses: actions/cache@v4
      with:
        path: ${{ inputs.install-prefix }}
        key: epics-base-anl-${{ inputs.epics-version || '7.0.9' }}-${{ runner.os }}-${{ runner.arch }}

    - name: Compile EPICS Base
      if: inputs.method == 'compile'
      shell: bash
      env:
        VERSION: ${{ inputs.epics-version || '7.0.9' }}
        PREFIX: ${{ inputs.install-prefix }}
      run: |
        SRC="${PREFIX}/epics-base"
        # The epics.anl.gov release tarball bundles the PVA submodules
        # (pvData/pvAccess/pva2pva) so softIocPVA is built; the GitHub archive
        # tarball omits them. Build in place — EPICS_BASE points at the tree so
        # pvxs can later build against it.
        if [ ! -x "$SRC/bin/$EPICS_HOST_ARCH/softIocPVA" ]; then
          mkdir -p "$PREFIX"
          curl -fsSL "https://epics.anl.gov/download/base/base-${VERSION}.tar.gz" \
            | tar xz -C "$PREFIX"
          rm -rf "$SRC"
          mv "${PREFIX}/base-${VERSION}" "$SRC"
          make -C "$SRC" -j"$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)"
        fi
        echo "EPICS_BASE=${SRC}" >> "$GITHUB_ENV"
        echo "${SRC}/bin/${EPICS_HOST_ARCH}" >> "$GITHUB_PATH"
        python "$GITHUB_ACTION_PATH/../scripts/export_lib_paths.py" "${SRC}/lib/${EPICS_HOST_ARCH}"
