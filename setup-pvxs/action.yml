name: Setup PVXS
description: >-
  Install epics-base and pvxs via conda (micromamba), a pre-built Docker image,
  or compilation from source. Select the approach with the 'method' input.

inputs:
  method:
    description: Installation method — 'conda', 'docker', or 'compile'
    required: false
    default: conda

  # ── conda ──────────────────────────────────────────────────────────────
  pvxs-version:
    description: >-
      pvxs version. conda: package version (e.g. "1.5.1").
      compile: git tag (e.g. "1.5.1"). Ignored for docker.
    required: false
    default: ''
  epics-version:
    description: epics-base version (conda and compile methods)
    required: false
    default: ''
  environment-name:
    description: conda environment name (conda method only)
    required: false
    default: epics

  # ── docker ─────────────────────────────────────────────────────────────
  image:
    description: Docker image containing pvxs and epics-base (docker method only)
    required: false
    default: 'ghcr.io/epics-containers/epics-base-runtime:7.0.10ec1'
  network-name:
    description: Docker bridge network for CA/PVA communication (docker method only)
    required: false
    default: epics-net

  # ── compile ────────────────────────────────────────────────────────────
  install-prefix:
    description: Directory to install compiled EPICS Base and pvxs (compile method only)
    required: false
    default: '${{ github.workspace }}/.epics'

outputs:
  epics-host-arch:
    description: EPICS_HOST_ARCH value (e.g. linux-x86_64)
    value: ${{ steps.arch-conda.outputs.epics-host-arch || steps.arch-native.outputs.epics-host-arch || steps.setup-epics.outputs.epics-host-arch }}

runs:
  using: composite
  steps:

    # ── conda ──────────────────────────────────────────────────────────────
    - name: Setup micromamba (pvxs + epics-base)
      if: inputs.method == 'conda'
      uses: mamba-org/setup-micromamba@v2
      with:
        environment-name: ${{ inputs.environment-name }}
        create-args: >-
          ${{ inputs.pvxs-version  != '' && format('pvxs={0}',       inputs.pvxs-version)  || 'pvxs' }}
          ${{ inputs.epics-version != '' && format('epics-base={0}', inputs.epics-version) || 'epics-base' }}
        init-shell: bash
        cache-environment: true

    - name: Export arch and add conda env to PATH
      if: inputs.method == 'conda'
      id: arch-conda
      shell: micromamba-shell {0}
      run: |
        ARCH=$(python "$GITHUB_ACTION_PATH/../scripts/detect-arch.py")
        echo "EPICS_HOST_ARCH=${ARCH}" >> "$GITHUB_ENV"
        echo "epics-host-arch=${ARCH}" >> "$GITHUB_OUTPUT"
        # conda-forge puts pvxs tools (pvxget, softIocPVX, …) in $CONDA_PREFIX/bin
        # and epics-base CA tools (caget, softIocPVA, …) in $CONDA_PREFIX/epics/bin/$ARCH.
        # Expose both to subsequent plain-bash steps.
        echo "${CONDA_PREFIX}/bin" >> "$GITHUB_PATH"
        echo "${CONDA_PREFIX}/epics/bin/${ARCH}" >> "$GITHUB_PATH"
        echo "EPICS_BASE=${CONDA_PREFIX}/epics" >> "$GITHUB_ENV"
        if [ "$(uname)" = "Linux" ]; then
          echo "LD_LIBRARY_PATH=${CONDA_PREFIX}/epics/lib/${ARCH}:${CONDA_PREFIX}/lib:${LD_LIBRARY_PATH}" >> "$GITHUB_ENV"
        else
          echo "DYLD_LIBRARY_PATH=${CONDA_PREFIX}/epics/lib/${ARCH}:${CONDA_PREFIX}/lib:${DYLD_LIBRARY_PATH}" >> "$GITHUB_ENV"
        fi

    # ── docker ─────────────────────────────────────────────────────────────
    # Reuse setup-epics to pull the image, create the network, detect arch,
    # and generate the CA wrappers (caget, caput, …, softIocPVA).
    - name: Setup EPICS Base (docker)
      if: inputs.method == 'docker'
      id: arch-native
      uses: ./setup-epics
      with:
        method: docker
        image: ${{ inputs.image }}
        network-name: ${{ inputs.network-name }}

    - name: Add PVXS wrapper scripts
      if: inputs.method == 'docker'
      shell: bash
      env:
        IMAGE: ${{ inputs.image }}
        NETWORK: ${{ inputs.network-name }}
      run: |
        WRAPPERS="${RUNNER_TEMP}/epics-wrappers"
        for CMD in pvxget pvxput pvxmonitor pvxinfo softIocPVX; do
          printf '#!/usr/bin/env bash\nexec docker run --rm --network "%s" "%s" "%s" "$@"\n' \
            "$NETWORK" "$IMAGE" "$CMD" > "$WRAPPERS/$CMD"
          chmod +x "$WRAPPERS/$CMD"
        done
        echo "PVXS_DOCKER_IMAGE=${IMAGE}" >> "$GITHUB_ENV"

    # ── compile ────────────────────────────────────────────────────────────
    - name: Setup EPICS Base
      if: inputs.method == 'compile'
      id: setup-epics
      uses: ./setup-epics
      with:
        method: compile
        epics-version: ${{ inputs.epics-version }}
        install-prefix: ${{ inputs.install-prefix }}

    - name: Install cmake
      if: inputs.method == 'compile'
      shell: bash
      run: |
        if [ "$(uname)" = "Linux" ]; then
          sudo apt-get update -qq
          sudo apt-get install -y cmake
        elif ! command -v cmake > /dev/null 2>&1; then
          brew install cmake
        fi

    - name: Restore pvxs cache
      if: inputs.method == 'compile'
      uses: actions/cache@v4
      with:
        path: ${{ inputs.install-prefix }}
        key: pvxs-${{ inputs.pvxs-version || '1.5.1' }}-epics-anl-${{ inputs.epics-version || '7.0.9' }}-${{ runner.os }}-${{ runner.arch }}

    - name: Compile pvxs
      if: inputs.method == 'compile'
      shell: bash
      env:
        VERSION: ${{ inputs.pvxs-version || '1.5.1' }}
        PREFIX: ${{ inputs.install-prefix }}
      run: |
        SRC="${PREFIX}/pvxs"
        # pvxs is an EPICS module: build it against the epics-base source tree
        # ($EPICS_BASE, set by setup-epics) using the bundled libevent submodule.
        if [ ! -x "$SRC/bin/$EPICS_HOST_ARCH/pvxget" ]; then
          rm -rf "$SRC"
          git clone --branch "$VERSION" --recurse-submodules \
            https://github.com/mdavidsaver/pvxs.git "$SRC"
          echo "EPICS_BASE=${EPICS_BASE}" > "$SRC/configure/RELEASE.local"
          make -C "$SRC/bundle" libevent
          make -C "$SRC" -j"$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)"
        fi
        echo "${SRC}/bin/${EPICS_HOST_ARCH}" >> "$GITHUB_PATH"
        BUNDLE_LIB="${SRC}/bundle/usr/${EPICS_HOST_ARCH}/lib"
        if [ "$(uname)" = "Linux" ]; then
          echo "LD_LIBRARY_PATH=${SRC}/lib/${EPICS_HOST_ARCH}:${BUNDLE_LIB}:${LD_LIBRARY_PATH}" >> "$GITHUB_ENV"
        else
          echo "DYLD_LIBRARY_PATH=${SRC}/lib/${EPICS_HOST_ARCH}:${BUNDLE_LIB}:${DYLD_LIBRARY_PATH}" >> "$GITHUB_ENV"
        fi
