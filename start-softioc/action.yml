name: Start softIoc
description: >-
  Start a softIocPVA (or softIocPVX) instance and wait until it is ready.
  Works with all three setup methods (conda, docker, compile).

inputs:
  method:
    description: Must match the method used in setup-epics / setup-pvxs — 'conda', 'docker', or 'compile'
    required: false
    default: conda
  db-file:
    description: Path to the .db file to load
    required: true
  macros:
    description: Macro string passed to -m (e.g. "P=TEST:,R=REC:")
    required: false
    default: ''
  use-pvxs:
    description: Use softIocPVX (pvxs) instead of softIocPVA
    required: false
    default: 'false'
  wait-pv:
    description: PV name to poll until the IOC is ready (recommended)
    required: false
    default: ''
  wait-timeout:
    description: Seconds to sleep when wait-pv is not set
    required: false
    default: '10'
  container-name:
    description: Docker container name (docker method only)
    required: false
    default: 'softioc'

runs:
  using: composite
  steps:

    # ── conda + compile ────────────────────────────────────────────────────
    # setup-epics exports ${CONDA_PREFIX}/bin to $GITHUB_PATH for conda, so
    # plain bash works for both methods here.
    - name: Start softIoc
      if: inputs.method != 'docker'
      shell: bash
      env:
        DB_FILE: ${{ inputs.db-file }}
        MACROS: ${{ inputs.macros }}
        USE_PVXS: ${{ inputs.use-pvxs }}
      run: |
        BINARY="softIoc"
        [ "$USE_PVXS" = "true" ] && BINARY="softIocPVX"

        # -S runs a non-interactive IOC that spins forever (stays up in the
        # background). -m macros apply to the -d database. softIoc has no -n.
        ARGS=(-S)
        [ -n "$MACROS" ] && ARGS+=(-m "$MACROS")
        ARGS+=(-d "$DB_FILE")

        "$BINARY" "${ARGS[@]}" > "$RUNNER_TEMP/softioc.log" 2>&1 &
        echo "SOFTIOC_PID=$!" >> "$GITHUB_ENV"
        echo "Started $BINARY with PID $!"

    - name: Wait for IOC to be ready
      if: inputs.method != 'docker'
      shell: bash
      env:
        WAIT_PV: ${{ inputs.wait-pv }}
        WAIT_TIMEOUT: ${{ inputs.wait-timeout }}
        USE_PVXS: ${{ inputs.use-pvxs }}
      run: |
        # softIocPVX serves PVA only, so poll with pvxget; softIocPVA serves CA.
        POLL="caget"
        [ "$USE_PVXS" = "true" ] && POLL="pvxget"
        if [ -n "$WAIT_PV" ]; then
          echo "Polling PV: $WAIT_PV"
          for i in $(seq 1 30); do
            if "$POLL" -w 1 "$WAIT_PV" > /dev/null 2>&1; then
              echo "IOC ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::IOC did not become ready within 30s"
          cat "$RUNNER_TEMP/softioc.log"
          exit 1
        else
          echo "No wait-pv specified, sleeping ${WAIT_TIMEOUT}s"
          sleep "$WAIT_TIMEOUT"
        fi

    # ── docker ─────────────────────────────────────────────────────────────
    - name: Start softIoc container
      if: inputs.method == 'docker'
      shell: bash
      env:
        DB_FILE: ${{ inputs.db-file }}
        MACROS: ${{ inputs.macros }}
        USE_PVXS: ${{ inputs.use-pvxs }}
        CONTAINER_NAME: ${{ inputs.container-name }}
      run: |
        if [ "$USE_PVXS" = "true" ]; then
          BINARY="softIocPVX"
          IMAGE="${PVXS_DOCKER_IMAGE:-${EPICS_DOCKER_IMAGE}}"
        else
          BINARY="softIoc"
          IMAGE="${EPICS_DOCKER_IMAGE}"
        fi

        ARGS=(-S)
        [ -n "$MACROS" ] && ARGS+=(-m "$MACROS")
        ARGS+=(-d /db/ioc.db)

        [[ "$DB_FILE" = /* ]] && ABS_DB="$DB_FILE" || ABS_DB="$PWD/$DB_FILE"

        docker run -d \
          --name "$CONTAINER_NAME" \
          --network "$EPICS_DOCKER_NETWORK" \
          -v "${ABS_DB}:/db/ioc.db:ro" \
          "$IMAGE" "$BINARY" "${ARGS[@]}"

        echo "SOFTIOC_CONTAINER=${CONTAINER_NAME}" >> "$GITHUB_ENV"
        echo "Started $BINARY container '$CONTAINER_NAME'"

        # Docker bridge networks don't deliver CA/PVA broadcast, so point
        # clients at the IOC container by name (resolved via Docker DNS).
        {
          echo "EPICS_CA_AUTO_ADDR_LIST=NO"
          echo "EPICS_CA_ADDR_LIST=${CONTAINER_NAME}"
          echo "EPICS_PVA_AUTO_ADDR_LIST=NO"
          echo "EPICS_PVA_ADDR_LIST=${CONTAINER_NAME}"
        } >> "$GITHUB_ENV"

    - name: Wait for IOC container to be ready
      if: inputs.method == 'docker'
      shell: bash
      env:
        WAIT_PV: ${{ inputs.wait-pv }}
        WAIT_TIMEOUT: ${{ inputs.wait-timeout }}
        USE_PVXS: ${{ inputs.use-pvxs }}
      run: |
        # softIocPVX serves PVA only, so poll with pvxget; softIocPVA serves CA.
        POLL="caget"
        [ "$USE_PVXS" = "true" ] && POLL="pvxget"
        if [ -n "$WAIT_PV" ]; then
          echo "Polling PV: $WAIT_PV"
          for i in $(seq 1 30); do
            if "$POLL" -w 1 "$WAIT_PV" > /dev/null 2>&1; then
              echo "IOC ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::IOC did not become ready within 30s"
          docker logs "$SOFTIOC_CONTAINER" || true
          exit 1
        else
          echo "No wait-pv specified, sleeping ${WAIT_TIMEOUT}s"
          sleep "$WAIT_TIMEOUT"
        fi
