name: Start softIoc
description: Start a softIocPVA (or softIocPVX) instance as a detached Docker container

inputs:
  db-file:
    description: Path to the .db file to load (relative to workspace root)
    required: true
  macros:
    description: Macro string passed to -m (e.g. "P=TEST:,R=REC:")
    required: false
    default: ''
  ioc-name:
    description: IOC name / prefix passed to -n
    required: false
    default: 'softioc'
  use-pvxs:
    description: Use softIocPVX (pvxs) instead of softIocPVA
    required: false
    default: 'false'
  wait-pv:
    description: CA/PVA PV name to poll until the IOC is ready (recommended)
    required: false
    default: ''
  wait-timeout:
    description: Seconds to wait when wait-pv is not set
    required: false
    default: '10'
  container-name:
    description: Name to assign to the softIoc Docker container
    required: false
    default: 'softioc'

runs:
  using: composite
  steps:
    - name: Start softIoc container
      shell: bash
      env:
        DB_FILE: ${{ inputs.db-file }}
        MACROS: ${{ inputs.macros }}
        IOC_NAME: ${{ inputs.ioc-name }}
        USE_PVXS: ${{ inputs.use-pvxs }}
        CONTAINER_NAME: ${{ inputs.container-name }}
      run: |
        if [ "$USE_PVXS" = "true" ]; then
          BINARY="softIocPVX"
          IMAGE="${PVXS_DOCKER_IMAGE:-${EPICS_DOCKER_IMAGE}}"
        else
          BINARY="softIocPVA"
          IMAGE="${EPICS_DOCKER_IMAGE}"
        fi

        IOC_ARGS=(-n "$IOC_NAME")
        [ -n "$MACROS" ] && IOC_ARGS+=(-m "$MACROS")
        IOC_ARGS+=(/db/ioc.db)

        docker run -d \
          --name "$CONTAINER_NAME" \
          --network "${EPICS_DOCKER_NETWORK}" \
          -v "${PWD}/${DB_FILE}:/db/ioc.db:ro" \
          "$IMAGE" \
          "$BINARY" "${IOC_ARGS[@]}"

        echo "SOFTIOC_CONTAINER=${CONTAINER_NAME}" >> "$GITHUB_ENV"
        echo "Started ${BINARY} container '${CONTAINER_NAME}'"

    - name: Wait for IOC to be ready
      shell: bash
      env:
        WAIT_PV: ${{ inputs.wait-pv }}
        WAIT_TIMEOUT: ${{ inputs.wait-timeout }}
      run: |
        if [ -n "$WAIT_PV" ]; then
          echo "Polling PV: $WAIT_PV"
          for i in $(seq 1 30); do
            if caget -w 1 "$WAIT_PV" > /dev/null 2>&1; then
              echo "IOC ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::IOC did not become ready within 30s"
          docker logs "$SOFTIOC_CONTAINER" || true
          exit 1
        else
          echo "No wait-pv specified, sleeping ${WAIT_TIMEOUT}s"
          sleep "$WAIT_TIMEOUT"
        fi
